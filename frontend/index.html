<!DOCTYPE html>
<html>
<head>
    <title>klapa.net - Student Roommate Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; }
        .filter-panel { position: absolute; top: 10px; left: 50px; z-index: 1000; background: white; padding: 10px; }
    </style>
</head>
<body>
    <div class="filter-panel">
        <h3>klapa.net - Tashkent</h3>
        <button onclick="fetchListings()">Refresh Map</button>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([41.2995, 69.2401], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        async function fetchListings() {
            const response = await fetch('/api/listings');
            const data = await response.json();
            
            data.forEach(item => {
                L.marker([item.lat, item.lng])
                    .addTo(map)
                    .bindPopup(`Price: ${item.price} UZS<br>Roommates needed: ${item.people_needed}<br><a href="/api/listings/${item.id}">View Details</a>`);
            });
        }
        fetchListings();
    </script>
</body>
</html>
