<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>klapa.net — Talabalar uchun sherik xaritasi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
 :root{
 --primary:#00A35C;
 --primary-dark:#00864B;
 --secondary:#476353;
 --surface:#FBFDF8;
 --surface-container:#F2F4EF;
 --surface-container-high:#E7E9E4;
 --on-surface:#191C1A;
 --on-surface-variant:#3D4A3F;
 --outline:#E1E3E1;
 --chip-bg:#D7E8DE;
 --chip-bg-active:#00A35C;
 --error:#BA1A1A;
 --radius-lg:1rem;
 --radius-pill:9999px;
 --shadow-1:0 2px 8px rgba(25,28,26,0.06);
 --shadow-2:0 6px 20px rgba(25,28,26,0.12);
 --shadow-3:0 12px 32px rgba(25,28,26,0.18);
 }
 *{box-sizing:border-box;}
 html,body{margin:0;padding:0;height:100%;font-family:'Plus Jakarta Sans',sans-serif;color:var(--on-surface);background:var(--surface);}
 #map{position:fixed;inset:0;z-index:0;}
 .leaflet-container{background:#eef1ec;font-family:'Plus Jakarta Sans',sans-serif;}

 /* ---------- Top bar ---------- */
 .topbar{
 position:fixed;top:16px;left:16px;right:16px;z-index:1000;
 display:flex;align-items:center;gap:12px;
 background:rgba(251,253,248,0.92);
 backdrop-filter:blur(10px);
 padding:10px 14px;border-radius:var(--radius-pill);
 box-shadow:var(--shadow-2);
 }
 .brand{
 display:flex;align-items:center;gap:8px;font-weight:700;font-size:18px;color:var(--primary-dark);
 white-space:nowrap;flex-shrink:0;
 }
 .brand svg{flex-shrink:0;}
 .search{
 flex:1;min-width:0;display:flex;align-items:center;gap:8px;
 background:var(--surface-container);border-radius:var(--radius-pill);
 padding:8px 16px;color:var(--on-surface-variant);font-size:14px;
 }
 .search input{border:none;background:none;outline:none;font-family:inherit;font-size:14px;width:100%;color:var(--on-surface);}
 .search input::placeholder{color:var(--on-surface-variant);}
 .stat{font-size:13px;color:var(--on-surface-variant);white-space:nowrap;flex-shrink:0;}
 .stat b{color:var(--on-surface);}
 .btn-add{
 flex-shrink:0;
 background:var(--primary);color:#fff;border:none;font-family:inherit;
 font-weight:600;font-size:14px;padding:10px 18px;border-radius:var(--radius-pill);
 cursor:pointer;transition:background .15s ease, transform .1s ease;
 display:flex;align-items:center;gap:6px;text-decoration:none;
 }
 .btn-add:hover{background:var(--primary-dark);}
 .btn-add:active{transform:scale(0.97);}

 /* ---------- Filters button + fly-out panel ---------- */
 .filters-wrap{
 position:fixed;top:74px;left:16px;z-index:1000;
 display:flex;align-items:flex-start;gap:8px;
 }
 .filters-btn{
 background:rgba(251,253,248,0.95);
 backdrop-filter:blur(6px);
 border:1px solid var(--outline);
 color:var(--on-surface-variant);
 font-family:inherit;font-size:13px;font-weight:600;
 padding:8px 14px;border-radius:var(--radius-pill);
 cursor:pointer;display:flex;align-items:center;gap:6px;
 box-shadow:var(--shadow-1);
 transition:border-color .15s ease;
 user-select:none;
 flex-shrink:0;
 }
 .filters-btn:hover{border-color:var(--primary);}

 .filters-panel{
 display:flex;gap:8px;flex-wrap:wrap;
 max-width:0;overflow:hidden;opacity:0;
 transition:max-width .25s ease, opacity .2s ease;
 }
 .filters-panel.open{max-width:900px;opacity:1;}
 .filters-panel .chip{
 background:rgba(251,253,248,0.95);
 backdrop-filter:blur(6px);
 border:1px solid var(--outline);
 color:var(--on-surface-variant);
 font-family:inherit;font-size:13px;font-weight:600;
 padding:8px 14px;border-radius:var(--radius-pill);
 cursor:pointer;display:flex;align-items:center;gap:6px;
 box-shadow:var(--shadow-1);
 transition:all .15s ease, transform .2s ease;
 user-select:none;
 white-space:nowrap;
 flex-shrink:0;
 transform:scale(0.85);
 opacity:0;
 }
 .filters-panel.open .chip{transform:scale(1);opacity:1;}
 .filters-panel.open .chip:nth-child(1){transition-delay:.02s;}
 .filters-panel.open .chip:nth-child(2){transition-delay:.06s;}
 .filters-panel.open .chip:nth-child(3){transition-delay:.10s;}
 .filters-panel.open .chip:nth-child(4){transition-delay:.14s;}
 .filters-panel.open .chip:nth-child(5){transition-delay:.18s;}
 .filters-panel .chip:hover{border-color:var(--primary);}
 .filters-panel .chip.active{background:var(--chip-bg-active);color:#fff;border-color:var(--chip-bg-active);}

 /* ---------- Sidebar ---------- */
 .sidebar-toggle{
 background:none;border:none;cursor:pointer;padding:0;
 display:flex;flex-direction:column;justify-content:center;align-items:center;
 width:28px;height:28px;flex-shrink:0;gap:5px;
 }
 .sidebar-toggle .bar{
 width:20px;height:2px;background:var(--primary-dark);border-radius:2px;
 transition:transform .25s ease, opacity .2s ease;
 }
 .sidebar-toggle.open .bar1{transform:translateY(7px) rotate(45deg);}
 .sidebar-toggle.open .bar2{opacity:0;}
 .sidebar-toggle.open .bar3{transform:translateY(-7px) rotate(-45deg);}
 .sidebar-overlay{
 position:fixed;inset:0;background:rgba(25,28,26,0.4);z-index:2500;
 display:none;
 }
 .sidebar-overlay.open{display:block;}
 .sidebar{
 position:fixed;top:0;left:0;bottom:0;width:280px;
 background:var(--surface);z-index:2600;
 box-shadow:var(--shadow-3);
 transform:translateX(-100%);transition:transform .2s ease;
 display:flex;flex-direction:column;padding:20px;
 }
 .sidebar.open{transform:translateX(0);}
 .sidebar-brand{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
 .sidebar-brand .brand{font-size:18px;}
 .sidebar-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--on-surface-variant);}
 .sidebar-nav{display:flex;flex-direction:column;gap:2px;}
 .sidebar-nav a{
 display:block;padding:12px 14px;border-radius:0.75rem;
 color:var(--on-surface);text-decoration:none;font-weight:600;font-size:15px;
 transition:background .15s ease;
 }
 .sidebar-nav a:hover{background:var(--surface-container);}
 .sidebar-nav a.current{background:var(--chip-bg);color:var(--primary-dark);}
 .sidebar-footer{margin-top:auto;padding-top:16px;border-top:1px solid var(--outline);}

 /* ---------- Legend ---------- */
 .legend{
 position:fixed;bottom:20px;left:16px;z-index:1000;
 background:rgba(251,253,248,0.95);backdrop-filter:blur(6px);
 padding:10px 14px;border-radius:var(--radius-lg);
 font-size:12px;color:var(--on-surface-variant);box-shadow:var(--shadow-1);
 display:flex;flex-direction:column;gap:4px;
 }
 .legend-item{display:flex;align-items:center;gap:6px;}
 .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

 /* ---------- Price marker ---------- */
 .price-pin{
 background:var(--primary);color:#fff;font-weight:700;font-size:13px;
 padding:6px 12px;border-radius:var(--radius-pill);
 box-shadow:var(--shadow-2);white-space:nowrap;
 border:2px solid #fff;
 font-family:'Plus Jakarta Sans',sans-serif;
 }
 .price-pin.reviewing{background:var(--surface-container-high);color:var(--on-surface-variant);}

 /* ---------- Modal ---------- */
 .overlay{
 position:fixed;inset:0;background:rgba(25,28,26,0.45);z-index:2000;
 display:none;align-items:center;justify-content:center;padding:16px;
 }
 .overlay.open{display:flex;}
 .modal{
 background:var(--surface);border-radius:1.25rem;max-width:420px;width:100%;
 max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-3);
 animation:pop .18s ease;
 }
 @keyframes pop{from{transform:scale(0.96);opacity:0;}to{transform:scale(1);opacity:1;}}
 .modal-header{position:relative;}
 .carousel{position:relative;height:220px;background:var(--surface-container-high);border-radius:1.25rem 1.25rem 0 0;overflow:hidden;}
 .carousel img{width:100%;height:100%;object-fit:cover;display:none;}
 .carousel img.active{display:block;}
 .carousel-nav{
 position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
 display:flex;gap:5px;
 }
 .carousel-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.55);}
 .carousel-dot.active{background:#fff;}
 .modal-close{
 position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:50%;
 background:rgba(25,28,26,0.5);color:#fff;border:none;font-size:16px;cursor:pointer;
 display:flex;align-items:center;justify-content:center;
 }
 .modal-body{padding:18px 20px 22px;}
 .modal-price{font-size:22px;font-weight:700;color:var(--on-surface);}
 .modal-sub{font-size:13px;color:var(--on-surface-variant);margin-top:2px;}
 .modal-chips{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0;}
 .modal-chips .tag{
 background:var(--chip-bg);color:var(--primary-dark);font-size:12px;font-weight:600;
 padding:6px 12px;border-radius:var(--radius-pill);
 }
 .modal-actions{display:flex;flex-direction:column;gap:10px;margin-top:6px;}
 .btn-primary{
 background:var(--primary);color:#fff;border:none;font-family:inherit;font-weight:700;
 font-size:15px;padding:14px;border-radius:var(--radius-pill);cursor:pointer;
 text-decoration:none;text-align:center;display:block;
 }
 .btn-primary:hover{background:var(--primary-dark);}
 .btn-report{
 background:none;border:none;color:var(--error);font-family:inherit;font-size:13px;
 font-weight:600;cursor:pointer;text-align:center;padding:4px;
 }

 /* ---------- Empty state ---------- */
 .empty-toast{
 position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:1000;
 background:var(--on-surface);color:#fff;font-size:13px;padding:10px 18px;
 border-radius:var(--radius-pill);box-shadow:var(--shadow-2);display:none;
 }

 @media (max-width:600px){
 .topbar{flex-wrap:wrap;border-radius:1.25rem;}
 .brand{order:1;}
 .btn-add{order:2;margin-left:auto;}
 .search{order:3;width:100%;}
 .stat{display:none;}
 .filters-wrap{top:120px;}
 .modal{max-width:100%;}
 }
</style>
</head>
<body>

<div id="map"></div>

<div class="topbar">
 <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" aria-label="Menyuni ochish">
 <span class="bar bar1"></span>
 <span class="bar bar2"></span>
 <span class="bar bar3"></span>
 </button>
 <div class="brand">klapa.net</div>
 <div class="search">
 <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
 <input type="text" id="searchInput" placeholder="Universitet yoki tuman qidirish...">
 </div>
 <div class="stat" id="listingCount">— ta joy</div>
 <a class="btn-add" href="https://t.me/klapa_net_bot?start=add" target="_blank">
 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
 Joy qo'shish
 </a>
</div>

<div class="filters-wrap">
 <button class="filters-btn" id="filtersBtn" onclick="toggleFiltersPanel()">
 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><circle cx="14" cy="6" r="2" fill="currentColor" stroke="none"/><line x1="4" y1="12" x2="20" y2="12"/><circle cx="8" cy="12" r="2" fill="currentColor" stroke="none"/><line x1="4" y1="18" x2="20" y2="18"/><circle cx="16" cy="18" r="2" fill="currentColor" stroke="none"/></svg>
 Filters
 </button>
 <div class="filters-panel" id="filtersPanel">
 <div class="chip" data-filter="has_wifi">📶 Wi-Fi</div>
 <div class="chip" data-filter="has_ac">❄️ Kondёr</div>
 <div class="chip" data-filter="has_washing_machine">🧺 Kir yuvish</div>
 <div class="chip" data-filter="no_landlord_in_yard">🏡 Xo'jayinsiz</div>
 <div class="chip" data-filter="near_metro">🚇 Metro yaqin</div>
 </div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<div class="sidebar" id="sidebar">
 <div class="sidebar-brand">
 <div class="brand">klapa.net</div>
 <button class="sidebar-close" onclick="closeSidebar()">✕</button>
 </div>
 <nav class="sidebar-nav">
 <a href="/" class="current">Asosiy</a>
 <a href="/xarita">Xarita</a>
 <a href="/elonlar">E'lonlar</a>
 <a href="/qanday-ishlaydi">Qanday ishlaydi</a>
 <a href="/qoidalar">Qoidalar</a>
 <a href="/savollar">Savollar</a>
 </nav>
 <div class="sidebar-footer">
 <a class="btn-add" style="width:100%;justify-content:center;" href="https://t.me/klapa_net_bot?start=add" target="_blank">Joy qo'shish</a>
 </div>
</div>

<div class="legend">
 <div class="legend-item"><span class="dot" style="background:var(--primary)"></span> Bo'sh joylar</div>
 <div class="legend-item"><span class="dot" style="background:var(--surface-container-high);border:1px solid var(--outline)"></span> Ko'rib chiqilmoqda</div>
</div>

<div class="empty-toast" id="emptyToast">Bu filtrga mos joy topilmadi</div>

<div class="overlay" id="overlay">
 <div class="modal">
 <div class="modal-header">
 <div class="carousel" id="carousel"></div>
 <button class="modal-close" onclick="closeModal()">✕</button>
 </div>
 <div class="modal-body" id="modalBody"></div>
 </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ---------- Map setup ----------
const map = L.map('map', { zoomControl: false }).setView([41.2995, 69.2401], 12);
L.control.zoom({ position: 'bottomright' }).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
 attribution: '&copy; OpenStreetMap contributors',
 maxZoom: 19
}).addTo(map);

// ---------- Demo fallback data (used only if /api/listings is unreachable) ----------
const DEMO_LISTINGS = [
 { id: 1, lat: 41.3111, lng: 69.2797, price: 700000, people_needed: 1, has_wifi:1, has_ac:1, has_washing_machine:0, no_landlord_in_yard:1, near_metro:1, telegram_username:"aziz_tatu", photos:[] },
 { id: 2, lat: 41.2856, lng: 69.2034, price: 850000, people_needed: 2, has_wifi:1, has_ac:0, has_washing_machine:1, no_landlord_in_yard:0, near_metro:0, telegram_username:"madina_wiut", photos:[] },
 { id: 3, lat: 41.3400, lng: 69.3200, price: 600000, people_needed: 1, has_wifi:0, has_ac:1, has_washing_machine:1, no_landlord_in_yard:1, near_metro:0, telegram_username:"nigina_inha", photos:[], status:"hidden_pending_review" },
];

let allListings = [];
let activeFilters = new Set();
let markers = [];

async function loadListings(){
 try {
 const res = await fetch('/api/listings');
 if(!res.ok) throw new Error('bad response');
 allListings = await res.json();
 if(!Array.isArray(allListings) || allListings.length === 0) throw new Error('empty');
 } catch(e){
 // Fallback so the design can be previewed without a running backend
 allListings = DEMO_LISTINGS;
 }
 renderMarkers();
}

function formatPrice(p){
 return new Intl.NumberFormat('ru-RU').format(p) + " so'm";
}

function renderMarkers(){
 markers.forEach(m => map.removeLayer(m));
 markers = [];

 const filtered = allListings.filter(l => {
 for (const f of activeFilters){ if(!l[f]) return false; }
 return true;
 });

 document.getElementById('listingCount').innerHTML = `<b>${filtered.length}</b> ta joy`;

 if(filtered.length === 0 && activeFilters.size > 0){
 const toast = document.getElementById('emptyToast');
 toast.style.display = 'block';
 setTimeout(()=> toast.style.display = 'none', 2000);
 }

 filtered.forEach(item => {
 const isSeeker = item.listing_type === 'seek';
 if(isSeeker) return;
 const isReviewing = item.status === 'hidden_pending_review';
 const icon = L.divIcon({
 className: '',
 html: `<div class="price-pin ${isReviewing ? 'reviewing' : ''}">${formatPrice(item.price)}</div>`,
 iconSize: null
 });
 const marker = L.marker([item.lat, item.lng], { icon }).addTo(map);
 marker.on('click', () => openModal(item));
 markers.push(marker);
 });
}

// ---------- Filters ----------
document.querySelectorAll('.filters-panel .chip').forEach(chip => {
 chip.addEventListener('click', () => {
 const key = chip.dataset.filter;
 if(activeFilters.has(key)){ activeFilters.delete(key); chip.classList.remove('active'); }
 else { activeFilters.add(key); chip.classList.add('active'); }
 renderMarkers();
 });
});

function toggleFiltersPanel(){
 document.getElementById('filtersPanel').classList.toggle('open');
}
document.addEventListener('click', (e) => {
 const wrap = document.querySelector('.filters-wrap');
 if(wrap && !wrap.contains(e.target)){
 document.getElementById('filtersPanel').classList.remove('open');
 }
});

// ---------- Sidebar ----------
function toggleSidebar(){
 document.getElementById('sidebar').classList.toggle('open');
 document.getElementById('sidebarOverlay').classList.toggle('open');
 document.getElementById('sidebarToggle').classList.toggle('open');
}
function closeSidebar(){
 document.getElementById('sidebar').classList.remove('open');
 document.getElementById('sidebarOverlay').classList.remove('open');
 document.getElementById('sidebarToggle').classList.remove('open');
}

// ---------- Modal ----------
let currentPhotoIndex = 0;
let currentPhotos = [];

function openModal(item){
 currentPhotoIndex = 0;
 currentPhotos = (item.photos && item.photos.length > 0) ? item.photos : ['PLACEHOLDER'];

 renderCarousel();

 const amenityLabels = {
 has_wifi: '📶 Wi-Fi', has_ac: '❄️ Kondёr', has_washing_machine: '🧺 Kir yuvish mashinasi',
 no_landlord_in_yard: "🏡 Xo'jayinlarsiz", near_metro: '🚇 Metro yaqin'
 };
 const chips = Object.keys(amenityLabels)
 .filter(k => item[k])
 .map(k => `<span class="tag">${amenityLabels[k]}</span>`).join('');

 document.getElementById('modalBody').innerHTML = `
 <div class="modal-price">${formatPrice(item.price)} / oyiga</div>
 <div class="modal-sub">+${item.people_needed} kishi kerak</div>
 <div class="modal-chips">${chips || ''}</div>
 <div class="modal-actions">
 <a class="btn-primary" href="https://t.me/${item.telegram_username}" target="_blank">Telegram orqali yozish</a>
 <button class="btn-report" onclick="reportListing(${item.id})">Shikoyat qilish</button>
 </div>
 `;
 document.getElementById('overlay').classList.add('open');
}

function renderCarousel(){
 const el = document.getElementById('carousel');
 if(currentPhotos[0] === 'PLACEHOLDER'){
 el.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--on-surface-variant);font-size:13px;">Rasm yo'q</div>`;
 return;
 }
 el.innerHTML = currentPhotos.map((p,i) => `<img src="${p}" class="${i===currentPhotoIndex?'active':''}">`).join('') +
 `<div class="carousel-nav">${currentPhotos.map((_,i)=>`<div class="carousel-dot ${i===currentPhotoIndex?'active':''}"></div>`).join('')}</div>`;
}

function closeModal(){
 document.getElementById('overlay').classList.remove('open');
}
document.addEventListener('click', (e) => {
 if(e.target.id === 'overlay') closeModal();
});

async function reportListing(id){
 const reason = prompt("Shikoyat sababi (masalan: makler, spam):");
 if(!reason) return;
 try {
 await fetch(`/api/report?listing_id=${id}&reason=${encodeURIComponent(reason)}`, { method: 'POST' });
 alert("Shikoyat qabul qilindi. Rahmat!");
 } catch(e){
 alert("Xatolik yuz berdi, birozdan so'ng qayta urinib ko'ring.");
 }
 closeModal();
}

// ---------- Search (client-side, filters by nothing yet — placeholder for university/district search) ----------
document.getElementById('searchInput').addEventListener('input', (e) => {
 // Hook point: once university/district data is attached to listings,
 // filter `allListings` here and call renderMarkers().
});

loadListings();
</script>
</body>
</html>
