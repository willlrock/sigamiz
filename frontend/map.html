<title>Sigamiz - Talabalar uchun turar joy xaritasi</title>

<style>
:root{
 --surface:#FBFDF8; --surface-low:#F3F4F0; --surface-container:#F2F4EF;
 --surface-high:#E7E9E5; --white:#fff; --primary:#006A3A; --primary-bright:#00A35C;
 --primary-container:#00864B; --secondary:#486454; --tertiary:#D6E7DD;
 --text:#191C1A; --muted:#3D4A3F; --outline:#E1E3E1; --outline-strong:#BCCABC;
 --seek:#2563EB; --seek-soft:#DCE8FF; --danger:#BA1A1A; --telegram:#2AABEE;
 --shadow-1:0 4px 6px -1px rgba(25,28,26,.06);
 --shadow-2:0 10px 15px -3px rgba(25,28,26,.12);
 --shadow-3:0 24px 50px -18px rgba(25,28,26,.28);
 --radius-lg:24px; --radius-xl:32px; --pill:999px;
 --spring:cubic-bezier(.34,1.56,.64,1);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:"Plus Jakarta Sans",sans-serif;background:var(--surface);color:var(--text)}
button,input{font:inherit}
a{color:inherit;text-decoration:none}
.icon{width:24px;height:24px;display:inline-block;flex:0 0 auto;fill:currentColor}
.topbar{position:fixed;top:0;left:0;right:0;height:80px;z-index:1000;background:rgba(251,253,248,.82);backdrop-filter:blur(14px);box-shadow:var(--shadow-1);border-bottom:1px solid rgba(225,227,225,.7)}
.topbar-inner{height:100%;max-width:1200px;margin:0 auto;padding:0 16px;display:flex;align-items:center;justify-content:space-between;gap:24px}
.brand{font-size:26px;font-weight:800;color:var(--primary);letter-spacing:0}
.nav{display:flex;align-items:center;gap:28px}
.nav a{font-size:15px;font-weight:600;color:var(--muted);padding:28px 0 8px;border-bottom:2px solid transparent}
.nav a.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:800}
.actions{display:flex;align-items:center;gap:24px}
.add-btn{display:inline-flex;align-items:center;gap:8px;background:var(--primary);color:#fff;border:0;border-radius:var(--pill);padding:12px 24px;font-weight:800;box-shadow:var(--shadow-1)}
.add-btn:hover{background:var(--primary-container)}
.account-wrap{position:relative}
.icon-btn{width:44px;height:44px;border-radius:50%;border:0;background:transparent;color:var(--primary);display:grid;place-items:center;cursor:pointer}
.icon-btn:hover{background:var(--surface-high)}
.account-menu{position:absolute;right:0;top:54px;width:280px;background:var(--surface);border:1px solid var(--outline);border-radius:18px;box-shadow:var(--shadow-3);padding:12px;display:none;z-index:1300}
.account-menu.open{display:grid;gap:10px}
.account-user{display:grid;gap:2px;border-bottom:1px solid var(--outline);padding:4px 4px 10px;color:var(--muted);font-size:12px}
.account-user b{font-size:14px;color:var(--text)}
.account-link{display:flex;align-items:center;gap:9px;border-radius:12px;padding:10px 11px;color:var(--muted);font-weight:800}
.account-link:hover{background:var(--surface-container);color:var(--primary)}
.telegram-login-slot{display:grid;place-items:start;padding:4px}
.toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%,18px);z-index:2500;width:min(420px,calc(100vw - 32px));background:var(--text);color:#fff;border-radius:18px;padding:14px 16px;box-shadow:var(--shadow-3);opacity:0;pointer-events:none;transition:.22s ease;font-size:14px;line-height:1.45}
.toast.show{opacity:1;transform:translate(-50%,0);pointer-events:auto}
.toast a{color:#CFF7DC;font-weight:900;text-decoration:underline}
.layout{height:100vh;padding-top:80px;position:relative;overflow:hidden}
.map-wrap{position:absolute;inset:80px 0 0;background:var(--surface-low)}
#map{position:absolute;inset:0;z-index:0}
.map-fallback{position:absolute;inset:0;background:center/cover url("https://lh3.googleusercontent.com/aida-public/AB6AXuBxnbz-z52KTOBqvw_Q59kJ8Od7qXY_UMF3PYDlnOW2alQ0gTNWV4uRoEXitzVWjIW6tPdqT2oghccjzs_C2N4guIiFcQPD5LoTslivdN0aH6opnIu9_VQvn-nfSGxuB7JWB9bLTDmjLhfsgbxWP2vOT7n8gLfzyZj2ISGWNrKbsAVK4M78XGQFULhG7EEf07KIeTvEtQEtF9g08RwYH-o5BpFqavAo4TRPx54_eFMNMKfH_h4AsgfGsgVhHFOKiV2ZN75-bT7ZhHg");filter:saturate(.92);z-index:-1}
.map-fallback,#map{transition:height .45s var(--spring)}
.map-tools{position:absolute;top:24px;left:24px;right:24px;max-width:540px;z-index:500;display:flex;flex-direction:column;gap:12px}
.search-box{display:flex;align-items:center;gap:10px;background:rgba(251,253,248,.95);backdrop-filter:blur(12px);border:1px solid rgba(225,227,225,.75);border-radius:var(--pill);padding:8px 8px 8px 14px;box-shadow:var(--shadow-2);transition:border-radius .4s var(--spring),box-shadow .25s ease}
.search-box .icon{color:var(--primary)}
.search-box input{border:0;outline:0;background:transparent;width:100%;font-size:16px;color:var(--text)}
.search-icon-btn{width:34px;height:34px;border:0;border-radius:50%;background:transparent;color:var(--primary);display:grid;place-items:center;padding:0;cursor:text;transition:background .2s ease}
.search-icon-btn:hover{background:var(--surface-high)}
.search-icon-btn .icon{transition:transform .3s var(--spring)}
body.serp-mode .search-icon-btn{cursor:pointer}
body.serp-mode .search-icon-btn:hover .icon{transform:translateX(-2px)}
.search-tune{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:var(--surface-container)}
.chip-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.chip-row::-webkit-scrollbar{display:none}
.chip[data-type="seek"]{display:none}
.chip{min-width:44px;height:44px;white-space:nowrap;border:1px solid var(--outline);background:rgba(251,253,248,.92);color:var(--muted);border-radius:22px;padding:0 11px;font-size:13px;font-weight:800;box-shadow:var(--shadow-1);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:7px;transition:min-width .34s var(--spring),padding .34s var(--spring),border-radius .34s var(--spring),background .2s ease,border-color .2s ease,color .2s ease}
.chip:hover,.chip:focus-visible{min-width:104px;border-radius:14px;border-color:var(--primary);padding:0 14px}
.chip.active{min-width:112px;padding:0 15px;border-radius:14px;background:var(--primary);border-color:var(--primary);color:#fff}
.chip .icon{width:18px;height:18px}
.chip-label{max-width:0;opacity:0;overflow:hidden;text-overflow:clip;transition:max-width .34s var(--spring),opacity .2s ease}
.chip:hover .chip-label,.chip:focus-visible .chip-label,.chip.active .chip-label{max-width:150px;opacity:1}
.price-chip{position:relative;padding:0;cursor:default}
.price-chip.active,.price-chip:focus-within{min-width:300px;border-radius:14px;background:var(--surface);border-color:var(--primary);color:var(--text)}
.price-chip-toggle{height:42px;min-width:42px;border:0;border-radius:13px;background:transparent;color:inherit;display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:0 12px;font-weight:800;cursor:pointer}
.price-fields{width:0;opacity:0;overflow:hidden;display:grid;grid-template-columns:1fr 1fr;gap:6px;transition:width .34s var(--spring),opacity .2s ease}
.price-chip.active .price-fields,.price-chip:focus-within .price-fields{width:164px;opacity:1;margin-right:8px}
.price-fields input{min-width:0;width:100%;border:1px solid var(--outline);border-radius:16px;background:var(--surface-container);padding:7px 9px;font-size:12px;font-weight:800;color:var(--text);outline:0}
.price-fields input:focus{border-color:var(--primary)}
.pin{display:flex;align-items:center;gap:6px;border:2px solid #fff;border-radius:var(--pill);padding:7px 12px;color:#fff;font-size:13px;font-weight:800;box-shadow:var(--shadow-2);position:relative}
.pin:after{content:"";position:absolute;left:50%;bottom:-8px;transform:translateX(-50%);border-left:6px solid transparent;border-right:6px solid transparent;border-top:8px solid currentColor;filter:drop-shadow(0 2px 1px rgba(0,0,0,.12))}
.pin.offer{background:var(--primary);color:var(--primary)}
.pin.seek{background:var(--seek);color:var(--seek)}
.pin span{color:#fff;position:relative;z-index:1}
.pin.reviewing{background:var(--surface);color:var(--outline-strong)}
.pin.reviewing span{color:var(--muted)}
.fab{position:absolute;right:32px;bottom:32px;z-index:510;display:inline-flex;align-items:center;gap:12px;background:var(--telegram);color:#fff;border:0;border-radius:var(--pill);padding:16px 28px;font-size:15px;font-weight:800;box-shadow:0 18px 38px -16px rgba(42,171,238,.8)}
.fab:hover{background:#229ED9;transform:translateY(-1px)}
.results{position:absolute;top:104px;right:24px;bottom:24px;width:min(456px,calc(100vw - 48px));background:rgba(251,253,248,.96);backdrop-filter:blur(16px);border:1px solid rgba(225,227,225,.82);border-radius:32px 0 0 32px;box-shadow:var(--shadow-3);display:flex;flex-direction:column;min-width:0;z-index:20;overflow:hidden;transition:transform .28s ease,opacity .2s ease,top .45s var(--spring),left .45s var(--spring),right .45s var(--spring),bottom .45s var(--spring),width .45s var(--spring),border-radius .45s var(--spring)}
body.sheet-collapsed .results{transform:translateX(calc(100% + 32px));opacity:0}
.sheet-toggle{position:absolute;top:50%;right:480px;z-index:30;width:44px;height:64px;border:1px solid rgba(225,227,225,.82);border-right:0;border-radius:24px 0 0 24px;background:rgba(251,253,248,.96);backdrop-filter:blur(14px);color:var(--primary);display:grid;place-items:center;box-shadow:-8px 12px 28px -18px rgba(25,28,26,.36);cursor:pointer;transition:right .28s ease, transform .2s ease}
.sheet-toggle:hover{transform:translateX(-2px)}
body.sheet-collapsed .sheet-toggle{right:24px;border-right:1px solid rgba(225,227,225,.82);border-radius:24px}
body.sheet-collapsed .sheet-toggle .icon{transform:rotate(180deg)}
.results-head{padding:24px;border-bottom:1px solid var(--outline);display:flex;align-items:center;justify-content:space-between;gap:12px}
.results-title{font-size:26px;font-weight:800;margin:0}
.results-count{font-size:16px;font-weight:500;color:var(--muted);margin-left:8px}
.cards{padding:20px;overflow:auto;display:flex;flex-direction:column;gap:20px}
.card{background:#fff;border:1px solid var(--outline);border-radius:32px;overflow:hidden;box-shadow:var(--shadow-1);cursor:pointer;transition:.22s ease;display:flex;flex-direction:column}
.card:hover{box-shadow:var(--shadow-2);transform:translateY(-1px)}
.card.selected{border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,106,58,.12),var(--shadow-2)}
.card.viewed{opacity:.72}
.card.viewed:hover{opacity:1}
.card-media{height:232px;position:relative;background:var(--surface-high);display:grid;place-items:center;color:var(--muted);font-size:13px;overflow:hidden}
.card-media img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .7s ease}
.card:hover .card-media img{transform:scale(1.04)}
.favorite{position:absolute;top:14px;right:14px;width:46px;height:46px;border:0;border-radius:50%;background:rgba(251,253,248,.84);backdrop-filter:blur(10px);display:grid;place-items:center;color:var(--muted);box-shadow:var(--shadow-1)}
.favorite.active{background:var(--primary);color:#fff}
.viewed-badge{position:absolute;left:14px;top:14px;border-radius:var(--pill);background:rgba(251,253,248,.9);color:var(--primary);font-size:11px;font-weight:800;padding:7px 10px;box-shadow:var(--shadow-1)}
.card-price{font-size:21px;font-weight:800;color:var(--primary);letter-spacing:0;line-height:1.15}
.card-price small{font-size:13px;font-weight:700;color:var(--muted)}
.card-body{padding:18px 20px 20px;display:flex;flex-direction:column;gap:10px}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.card-title{font-size:18px;font-weight:800;margin:0;line-height:1.25}
.rating,.type-badge{display:inline-flex;align-items:center;gap:4px;border-radius:var(--pill);padding:6px 10px;background:var(--surface-container);font-size:12px;color:var(--muted);font-weight:700;white-space:nowrap}
.type-badge.offer{background:var(--tertiary);color:var(--primary)}
.type-badge.seek{background:var(--seek-soft);color:var(--seek)}
.desc{margin:0;color:var(--muted);line-height:1.45;font-size:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.tag{display:inline-flex;align-items:center;gap:5px;background:var(--tertiary);color:#3B4A43;border-radius:var(--pill);padding:5px 8px;font-size:11px;font-weight:700}
.empty{display:none;text-align:center;color:var(--muted);padding:40px 20px}
body.serp-mode #map,body.serp-mode .map-fallback{height:112px;overflow:hidden}
body.serp-mode .map-wrap:after{content:"";position:absolute;left:0;right:0;top:0;height:132px;background:linear-gradient(to bottom,rgba(251,253,248,0) 42%,var(--surface) 96%);pointer-events:none;z-index:1}
body.serp-mode .map-tools{z-index:520}
body.serp-mode .sheet-toggle{display:none}
body.serp-mode .fab{display:none}
body.serp-mode .search-box{border-radius:28px;box-shadow:var(--shadow-3)}
body.serp-mode .results{top:calc(80px + 112px + 16px);left:24px;right:24px;bottom:24px;width:auto;border-radius:var(--radius-xl);transform:none;opacity:1}
body.serp-mode .results-title{font-size:32px}
body.serp-mode .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(272px,1fr));gap:20px;align-content:start}
body.serp-mode .card{animation:cardRise .5s var(--spring) both}
body.serp-mode .card:nth-child(2){animation-delay:.04s}
body.serp-mode .card:nth-child(3){animation-delay:.08s}
body.serp-mode .card:nth-child(4){animation-delay:.12s}
body.serp-mode .card:nth-child(n+5){animation-delay:.16s}
@keyframes cardRise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@media (prefers-reduced-motion:reduce){
 body.serp-mode .card{animation:none}
 .map-fallback,#map,.results,.search-box,.chip,.chip-label,.price-fields{transition:none}
}
.drawer{position:fixed;inset:0;z-index:2000;display:none;background:rgba(25,28,26,.45);align-items:center;justify-content:center;padding:18px}
.drawer.open{display:flex}
.detail{width:min(460px,100%);max-height:88vh;overflow:auto;background:var(--surface);border-radius:32px;box-shadow:var(--shadow-3)}
.detail-media{height:250px;position:relative;background:var(--surface-high);display:grid;place-items:center;color:var(--muted);overflow:hidden;border-radius:32px 32px 0 0}
.detail-media img{width:100%;height:100%;object-fit:cover}
.close{position:absolute;top:14px;right:14px;width:40px;height:40px;border:0;border-radius:50%;background:rgba(25,28,26,.58);color:#fff;display:grid;place-items:center;cursor:pointer}
.detail-body{padding:20px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
.info{background:var(--surface-container);border-radius:16px;padding:10px 12px;min-width:0}
.info span{display:block;font-size:11px;color:var(--muted);margin-bottom:3px}
.info b{display:block;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.detail-actions{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.primary-action,.secondary-action{border-radius:var(--pill);padding:14px 18px;font-weight:800;text-align:center}
.primary-action{background:var(--primary);color:#fff}
.secondary-action{background:#fff;color:var(--primary);border:1px solid var(--outline)}
.report{border:0;background:transparent;color:var(--danger);font-weight:700;padding:8px;cursor:pointer}
@media (max-width:980px){
 .topbar{height:72px}.topbar-inner{gap:12px}.brand{font-size:22px}.nav{display:none}.actions{gap:8px}.actions .add-btn{width:44px;height:44px;padding:0;justify-content:center;font-size:0}.actions .add-btn .icon{width:20px;height:20px}
 .layout{padding-top:72px}.map-wrap{inset:72px 0 0}.map-tools{left:14px;right:14px;top:14px}.results{top:auto;left:0;right:0;bottom:0;width:auto;max-height:46vh;border-left:0;border-top:1px solid var(--outline);border-radius:28px 28px 0 0}.sheet-toggle{top:auto;right:18px;bottom:calc(46vh + 18px);width:48px;height:48px;border:1px solid rgba(225,227,225,.82);border-radius:50%}body.sheet-collapsed .results{transform:translateY(calc(100% + 18px));opacity:0}body.sheet-collapsed .sheet-toggle{right:18px;bottom:18px}.results-head{padding:16px 18px}.results-title{font-size:21px}.cards{padding:14px;display:grid;grid-auto-flow:column;grid-auto-columns:82%;overflow-x:auto}.card-media{height:160px}.fab{right:18px;bottom:calc(46vh + 82px);padding:14px 18px}.detail-grid{grid-template-columns:1fr}
 body.serp-mode #map,body.serp-mode .map-fallback{height:72px}
 body.serp-mode .map-wrap:after{height:92px}
 body.serp-mode .results{top:calc(72px + 132px + 10px);left:0;right:0;bottom:0;border-radius:24px 24px 0 0;max-height:none}
 body.serp-mode .cards{grid-auto-flow:row;grid-template-columns:1fr;overflow-x:visible;padding:16px}
 body.serp-mode .results-title{font-size:24px}
 .price-chip.active,.price-chip:focus-within{min-width:292px}
 .price-chip.active .price-fields,.price-chip:focus-within .price-fields{width:152px}
}
</style>
</head>

}

}

 if(priceMax && price > priceMax) return false;
 return true;
}
function matches(item){
 if(item.listing_type !== "offer") return false;
 for(const filter of activeFilters){ if(!item[filter]) return false; }
 if(!priceMatches(item)) return false;
 if(!query) return true;
 return [item.district,item.university,item.housing_type,item.description,item.telegram_username].filter(Boolean).join(" ").toLowerCase().includes(query);
}
function buildListingsUrl(){
 const params = new URLSearchParams();
 params.set("listing_type", "offer");
 if(priceMin) params.set("price_min", String(priceMin));
 if(priceMax) params.set("price_max", String(priceMax));
 activeFilters.forEach(filter => params.set(filter, "true"));
 const qs = params.toString();
 return qs ? `/api/listings?${qs}` : "/api/listings";
}

 }).join("");
}

function applySort(items){

 if(sortMode === "price_desc") return [...items].sort((a,b) => Number(b.price||0) - Number(a.price||0));

  markers.push(marker);
 });

  item.university && ["Universitet", item.university],
  item.housing_type && ["Uy turi", item.housing_type],
  item.room_count && ["Xonalar", `${item.room_count} xona`]
 ].filter(Boolean).map(([label,value]) => `<div class="info"><span>${escapeHtml(label)}</span><b>${escapeHtml(value)}</b></div>`).join("");
 document.getElementById("detailBody").innerHTML = `
  <span class="type-badge ${type.key}">${escapeHtml(type.label)}</span>
  <h2 style="margin:12px 0 4px;font-size:24px">${formatPrice(item.price)} / oyiga</h2>
  <p class="desc" style="-webkit-line-clamp:unset">${escapeHtml(item.description || type.sub)}</p>
  ${infos ? `<div class="detail-grid">${infos}</div>` : ""}
  <div class="tags">${tagsFor(item, 8)}</div>
  <div class="detail-actions">
   ${telegram ? `<a class="primary-action" href="https://t.me/${encodeURIComponent(telegram)}" target="_blank">Telegram orqali yozish</a>` : ""}
   ${phone ? `<a class="secondary-action" href="tel:${escapeHtml(phone.replace(/[^\\d+]/g,""))}">Telefon qilish</a>` : ""}
   <button class="report" type="button" onclick="reportListing(${item.id})">Shikoyat qilish</button>
  </div>`;
 document.getElementById("detailDrawer").classList.add("open");
}
async function toggleFavorite(event, id){
 event.stopPropagation();
 const item = allListings.find(entry => Number(entry.id) === Number(id));
 if(!item) return;
 const nextState = !item.is_favorite;
 item.is_favorite = nextState;
 render();
 try{
  const response = await fetch(`/api/favorites/${id}`, { method: nextState ? "POST" : "DELETE" });
  if(response.status === 401) throw new Error("auth");
  if(!response.ok) throw new Error("favorite");
  if(nextState) showToast(`E'lon izbrannoega qo'shildi. Bir nechta e'lonni saqlab, <a href="/favorites">Izbrannoeda solishtirishingiz mumkin</a>.`);
  else showToast("E'lon izbrannoedan olib tashlandi.");
 }catch(e){
  item.is_favorite = !nextState;
  render();
  openAccountMenu();
  showToast("Izbrannoe uchun avval Telegram orqali kiring.");
 }
}
async function markViewed(id){
 const item = allListings.find(entry => Number(entry.id) === Number(id));
 if(item && !item.viewed_at) {
  item.viewed_at = new Date().toISOString();
  render();
 }
 try{ await fetch(`/api/listings/${id}/view`, { method:"POST" }); }catch(e){}
}
function closeDetail(){ document.getElementById("detailDrawer").classList.remove("open"); }
function toggleResultsSheet(){
 const collapsed = document.body.classList.toggle("sheet-collapsed");
 document.querySelector(".sheet-toggle").setAttribute("aria-expanded", String(!collapsed));
}
function setActiveType(type, shouldLoad = true){
 activeType = type;
 document.querySelectorAll("[data-type]").forEach(item => item.classList.toggle("active", item.dataset.type === type));
 if(shouldLoad) loadListings();
}
function toggleSerpMode(forceState){
 const enable = typeof forceState === "boolean" ? forceState : !document.body.classList.contains("serp-mode");
 if(enable === document.body.classList.contains("serp-mode")) return;
 document.body.classList.toggle("serp-mode", enable);
 if(enable) document.body.classList.remove("sheet-collapsed");
 const icon = document.getElementById("searchIcon").querySelector("use");
 const iconBtn = document.getElementById("searchIconBtn");
 icon.setAttribute("href", enable ? "#i-back" : "#i-search");
 iconBtn.tabIndex = enable ? 0 : -1;
 iconBtn.setAttribute("aria-hidden", String(!enable));
 iconBtn.setAttribute("aria-label", enable ? "Xaritaga qaytish" : "Qidiruv");
 const url = new URL(window.location);
 if(enable) url.searchParams.set("view", "list"); else url.searchParams.delete("view");
 history.pushState({}, "", url);
 clearTimeout(window.__serpResizeTimer);
 window.__serpResizeTimer = setTimeout(() => { if(map) map.invalidateSize(); }, 480);
}
function openSearchResults(){
 toggleSerpMode(true);
 if(activeType === "all") setActiveType("offer");
 else render();
}
function exitSerpMode(){
 toggleSerpMode(false);
 document.getElementById("searchInput").blur();
}
function initViewFromUrl(){
 const params = new URLSearchParams(window.location.search);
 if(params.get("view") === "list"){
  toggleSerpMode(true);
  if(activeType === "all") setActiveType("offer", false);
 }
}
function getReporterKey(){
 const storageKey = "sigamiz_reporter_key";
 let key = localStorage.getItem(storageKey);
 if(!key){
  key = window.crypto && crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
  localStorage.setItem(storageKey, key);
 }
 return key;
}
async function reportListing(id){
 const reason = prompt("Shikoyat sababi (masalan: makler, spam):");
 if(!reason) return;
 const reporterKey = encodeURIComponent(getReporterKey());
 try{
  const response = await fetch(`/api/report?listing_id=${id}&reason=${encodeURIComponent(reason)}&reporter_key=${reporterKey}`, { method:"POST" });
  if(!response.ok) throw new Error("Report failed");
  const data = await response.json();
  alert(data.message || "Shikoyat qabul qilindi. Rahmat!");
 }
 catch(e){ alert("Xatolik yuz berdi, birozdan so'ng qayta urinib ko'ring."); }
 closeDetail();
}
document.getElementById("searchInput").addEventListener("input", event => {
 query = event.target.value.trim().toLowerCase();
 if(query && document.body.classList.contains("sheet-collapsed")) document.body.classList.remove("sheet-collapsed");
 render();
});
document.getElementById("searchInput").addEventListener("focus", openSearchResults);
document.getElementById("searchInput").addEventListener("keydown", event => {
 if(event.key === "Escape") exitSerpMode();
});
document.getElementById("searchIconBtn").addEventListener("click", () => {
 if(document.body.classList.contains("serp-mode")) exitSerpMode();
 else document.getElementById("searchInput").focus();
});
document.querySelectorAll("[data-type]").forEach(button => button.addEventListener("click", () => {
 setActiveType(button.dataset.type);
}));
document.querySelectorAll("[data-filter]").forEach(button => button.addEventListener("click", () => {
 const key = button.dataset.filter;
 activeFilters.has(key) ? activeFilters.delete(key) : activeFilters.add(key);
 button.classList.toggle("active");
 loadListings();
}));
document.getElementById("priceToggle").addEventListener("click", () => {
 const chip = document.getElementById("priceChip");
 const shouldOpen = !chip.classList.contains("active");
 chip.classList.toggle("active", shouldOpen);
 document.getElementById("priceToggle").setAttribute("aria-expanded", String(shouldOpen));
 if(shouldOpen) {
  centerChip(chip);
  document.getElementById("priceMin").focus();
  setTimeout(() => centerChip(chip), 80);
 }
});
["priceMin","priceMax"].forEach(id => {
 const input = document.getElementById(id);
 input.addEventListener("input", () => {
  priceMin = parseMoney(document.getElementById("priceMin").value);
  priceMax = parseMoney(document.getElementById("priceMax").value);
  updatePriceChip();
  render();
  scheduleListingsReload();
 });
 input.addEventListener("keydown", event => {
  if(event.key === "Enter"){
   event.preventDefault();
   loadListings();
   input.blur();
  }
 });
});
document.getElementById("priceChip").addEventListener("focusout", () => setTimeout(updatePriceChip, 80));
document.getElementById("detailDrawer").addEventListener("click", event => { if(event.target.id === "detailDrawer") closeDetail(); });
function openAccountMenu(){
 document.getElementById("accountMenu").classList.add("open");
 document.getElementById("accountBtn").setAttribute("aria-expanded","true");
}
function closeAccountMenu(){
 document.getElementById("accountMenu").classList.remove("open");
 document.getElementById("accountBtn").setAttribute("aria-expanded","false");
}
document.getElementById("accountBtn").addEventListener("click", event => {
 event.stopPropagation();
 document.getElementById("accountMenu").classList.contains("open") ? closeAccountMenu() : openAccountMenu();
});
document.getElementById("accountMenu").addEventListener("click", event => event.stopPropagation());
document.addEventListener("click", closeAccountMenu);
replaceLegacyIcons();
setActiveType("offer", false);
initMap();
initViewFromUrl();
updatePriceChip();
loadMe();
mountTelegramLogin();
loadListings();
</script>
</body>
</html>
