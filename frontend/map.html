<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sigamiz - Talabalar uchun turar joy xaritasi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root{
 --surface:#FBFDF8; --surface-low:#F3F4F0; --surface-container:#F2F4EF;
 --surface-high:#E7E9E5; --white:#fff; --primary:#006A3A; --primary-bright:#00A35C;
 --primary-container:#00864B; --secondary:#486454; --tertiary:#D6E7DD;
 --text:#191C1A; --muted:#3D4A3F; --outline:#E1E3E1; --outline-strong:#BCCABC;
 --seek:#2563EB; --seek-soft:#DCE8FF; --danger:#BA1A1A; --telegram:#2AABEE;
 --shadow-1:0 4px 6px -1px rgba(25,28,26,.06);
 --shadow-2:0 10px 15px -3px rgba(25,28,26,.12);
 --shadow-3:0 24px 50px -18px rgba(25,28,26,.28);
 --radius-lg:24px; --radius-xl:32px; --pill:999px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:"Plus Jakarta Sans",sans-serif;background:var(--surface);color:var(--text)}
button,input{font:inherit}
a{color:inherit;text-decoration:none}
.material-symbols-outlined{font-variation-settings:"FILL" 0,"wght" 500,"GRAD" 0,"opsz" 24}
.topbar{position:fixed;top:0;left:0;right:0;height:80px;z-index:1000;background:rgba(251,253,248,.82);backdrop-filter:blur(14px);box-shadow:var(--shadow-1);border-bottom:1px solid rgba(225,227,225,.7)}
.topbar-inner{height:100%;max-width:1200px;margin:0 auto;padding:0 16px;display:flex;align-items:center;justify-content:space-between;gap:24px}
.brand{font-size:26px;font-weight:800;color:var(--primary);letter-spacing:0}
.nav{display:flex;align-items:center;gap:28px}
.nav a{font-size:15px;font-weight:600;color:var(--muted);padding:28px 0 8px;border-bottom:2px solid transparent}
.nav a.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:800}
.actions{display:flex;align-items:center;gap:24px}
.add-btn{display:inline-flex;align-items:center;gap:8px;background:var(--primary);color:#fff;border:0;border-radius:var(--pill);padding:12px 24px;font-weight:800;box-shadow:var(--shadow-1)}
.add-btn:hover{background:var(--primary-container)}
.icon-btn{width:44px;height:44px;border-radius:50%;border:0;background:transparent;color:var(--primary);display:grid;place-items:center;cursor:pointer}
.icon-btn:hover{background:var(--surface-high)}
.layout{height:100vh;padding-top:80px;position:relative;overflow:hidden}
.map-wrap{position:absolute;inset:80px 0 0;background:var(--surface-low)}
#map{position:absolute;inset:0;z-index:0}
.map-fallback{position:absolute;inset:0;background:center/cover url("https://lh3.googleusercontent.com/aida-public/AB6AXuBxnbz-z52KTOBqvw_Q59kJ8Od7qXY_UMF3PYDlnOW2alQ0gTNWV4uRoEXitzVWjIW6tPdqT2oghccjzs_C2N4guIiFcQPD5LoTslivdN0aH6opnIu9_VQvn-nfSGxuB7JWB9bLTDmjLhfsgbxWP2vOT7n8gLfzyZj2ISGWNrKbsAVK4M78XGQFULhG7EEf07KIeTvEtQEtF9g08RwYH-o5BpFqavAo4TRPx54_eFMNMKfH_h4AsgfGsgVhHFOKiV2ZN75-bT7ZhHg");filter:saturate(.92);z-index:-1}
.map-tools{position:absolute;top:24px;left:24px;right:24px;max-width:540px;z-index:500;display:flex;flex-direction:column;gap:12px}
.search-box{display:flex;align-items:center;gap:12px;background:rgba(251,253,248,.95);backdrop-filter:blur(12px);border:1px solid rgba(225,227,225,.75);border-radius:var(--pill);padding:12px 16px;box-shadow:var(--shadow-2)}
.search-box .material-symbols-outlined{color:var(--primary)}
.search-box input{border:0;outline:0;background:transparent;width:100%;font-size:16px;color:var(--text)}
.chip-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.chip-row::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;border:1px solid var(--outline);background:rgba(251,253,248,.9);color:var(--muted);border-radius:var(--pill);padding:10px 15px;font-size:13px;font-weight:800;box-shadow:var(--shadow-1);cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.chip:hover{border-color:var(--primary)}
.chip.active{background:var(--primary);border-color:var(--primary);color:#fff}
.chip[data-type="seek"].active{background:var(--seek);border-color:var(--seek)}
.pin{display:flex;align-items:center;gap:6px;border:2px solid #fff;border-radius:var(--pill);padding:7px 12px;color:#fff;font-size:13px;font-weight:800;box-shadow:var(--shadow-2);position:relative}
.pin:after{content:"";position:absolute;left:50%;bottom:-8px;transform:translateX(-50%);border-left:6px solid transparent;border-right:6px solid transparent;border-top:8px solid currentColor;filter:drop-shadow(0 2px 1px rgba(0,0,0,.12))}
.pin.offer{background:var(--primary);color:var(--primary)}
.pin.seek{background:var(--seek);color:var(--seek)}
.pin span{color:#fff;position:relative;z-index:1}
.pin.reviewing{background:var(--surface);color:var(--outline-strong)}
.pin.reviewing span{color:var(--muted)}
.fab{position:absolute;right:32px;bottom:32px;z-index:510;display:inline-flex;align-items:center;gap:12px;background:var(--telegram);color:#fff;border:0;border-radius:var(--pill);padding:16px 28px;font-size:15px;font-weight:800;box-shadow:0 18px 38px -16px rgba(42,171,238,.8)}
.fab:hover{background:#229ED9;transform:translateY(-1px)}
.results{position:absolute;top:104px;right:24px;bottom:24px;width:min(456px,calc(100vw - 48px));background:rgba(251,253,248,.96);backdrop-filter:blur(16px);border:1px solid rgba(225,227,225,.82);border-radius:32px 0 0 32px;box-shadow:var(--shadow-3);display:flex;flex-direction:column;min-width:0;z-index:20;overflow:hidden;transition:transform .28s ease, opacity .2s ease}
body.sheet-collapsed .results{transform:translateX(calc(100% + 32px));opacity:0}
.sheet-toggle{position:absolute;top:50%;right:480px;z-index:30;width:44px;height:64px;border:1px solid rgba(225,227,225,.82);border-right:0;border-radius:24px 0 0 24px;background:rgba(251,253,248,.96);backdrop-filter:blur(14px);color:var(--primary);display:grid;place-items:center;box-shadow:-8px 12px 28px -18px rgba(25,28,26,.36);cursor:pointer;transition:right .28s ease, transform .2s ease}
.sheet-toggle:hover{transform:translateX(-2px)}
body.sheet-collapsed .sheet-toggle{right:24px;border-right:1px solid rgba(225,227,225,.82);border-radius:24px}
body.sheet-collapsed .sheet-toggle .material-symbols-outlined{transform:rotate(180deg)}
.results-head{padding:24px;border-bottom:1px solid var(--outline);display:flex;align-items:center;justify-content:space-between;gap:12px}
.results-title{font-size:26px;font-weight:800;margin:0}
.results-count{font-size:16px;font-weight:500;color:var(--muted);margin-left:8px}
.cards{padding:20px;overflow:auto;display:flex;flex-direction:column;gap:20px}
.card{background:#fff;border:1px solid var(--outline);border-radius:32px;overflow:hidden;box-shadow:var(--shadow-1);cursor:pointer;transition:.22s ease;display:flex;flex-direction:column}
.card:hover{box-shadow:var(--shadow-2);transform:translateY(-1px)}
.card.selected{border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,106,58,.12),var(--shadow-2)}
.card-media{height:232px;position:relative;background:var(--surface-high);display:grid;place-items:center;color:var(--muted);font-size:13px;overflow:hidden}
.card-media img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .7s ease}
.card:hover .card-media img{transform:scale(1.04)}
.favorite{position:absolute;top:14px;right:14px;width:46px;height:46px;border:0;border-radius:50%;background:rgba(251,253,248,.84);backdrop-filter:blur(10px);display:grid;place-items:center;color:var(--muted);box-shadow:var(--shadow-1)}
.card-price{font-size:21px;font-weight:800;color:var(--primary);letter-spacing:0;line-height:1.15}
.card-price small{font-size:13px;font-weight:700;color:var(--muted)}
.card-body{padding:18px 20px 20px;display:flex;flex-direction:column;gap:10px}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.card-title{font-size:18px;font-weight:800;margin:0;line-height:1.25}
.rating,.type-badge{display:inline-flex;align-items:center;gap:4px;border-radius:var(--pill);padding:6px 10px;background:var(--surface-container);font-size:12px;color:var(--muted);font-weight:700;white-space:nowrap}
.type-badge.offer{background:var(--tertiary);color:var(--primary)}
.type-badge.seek{background:var(--seek-soft);color:var(--seek)}
.desc{margin:0;color:var(--muted);line-height:1.45;font-size:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.tag{display:inline-flex;align-items:center;gap:5px;background:var(--tertiary);color:#3B4A43;border-radius:var(--pill);padding:5px 8px;font-size:11px;font-weight:700}
.empty{display:none;text-align:center;color:var(--muted);padding:40px 20px}
.drawer{position:fixed;inset:0;z-index:2000;display:none;background:rgba(25,28,26,.45);align-items:center;justify-content:center;padding:18px}
.drawer.open{display:flex}
.detail{width:min(460px,100%);max-height:88vh;overflow:auto;background:var(--surface);border-radius:32px;box-shadow:var(--shadow-3)}
.detail-media{height:250px;position:relative;background:var(--surface-high);display:grid;place-items:center;color:var(--muted);overflow:hidden;border-radius:32px 32px 0 0}
.detail-media img{width:100%;height:100%;object-fit:cover}
.close{position:absolute;top:14px;right:14px;width:40px;height:40px;border:0;border-radius:50%;background:rgba(25,28,26,.58);color:#fff;display:grid;place-items:center;cursor:pointer}
.detail-body{padding:20px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
.info{background:var(--surface-container);border-radius:16px;padding:10px 12px;min-width:0}
.info span{display:block;font-size:11px;color:var(--muted);margin-bottom:3px}
.info b{display:block;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.detail-actions{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.primary-action,.secondary-action{border-radius:var(--pill);padding:14px 18px;font-weight:800;text-align:center}
.primary-action{background:var(--primary);color:#fff}
.secondary-action{background:#fff;color:var(--primary);border:1px solid var(--outline)}
.report{border:0;background:transparent;color:var(--danger);font-weight:700;padding:8px;cursor:pointer}
@media (max-width:980px){
 .topbar{height:72px}.topbar-inner{gap:12px}.brand{font-size:22px}.nav{display:none}.actions .add-btn{padding:10px 16px}
 .layout{padding-top:72px}.map-wrap{inset:72px 0 0}.map-tools{left:14px;right:14px;top:14px}.results{top:auto;left:0;right:0;bottom:0;width:auto;max-height:46vh;border-left:0;border-top:1px solid var(--outline);border-radius:28px 28px 0 0}.sheet-toggle{top:auto;right:18px;bottom:calc(46vh + 18px);width:48px;height:48px;border:1px solid rgba(225,227,225,.82);border-radius:50%}body.sheet-collapsed .results{transform:translateY(calc(100% + 18px));opacity:0}body.sheet-collapsed .sheet-toggle{right:18px;bottom:18px}.results-head{padding:16px 18px}.results-title{font-size:21px}.cards{padding:14px;display:grid;grid-auto-flow:column;grid-auto-columns:82%;overflow-x:auto}.card-media{height:160px}.fab{right:18px;bottom:calc(46vh + 82px);padding:14px 18px}.detail-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<header class="topbar">
 <div class="topbar-inner">
  <a class="brand" href="/">Sigamiz</a>
  <nav class="nav">
   <a class="active" href="/xarita">Map</a>
   <a href="/about">About</a>
   <a href="/#how-it-works">How it works</a>
  </nav>
  <div class="actions">
   <a class="add-btn" href="https://t.me/klapa_net_bot?start=add" target="_blank"><span class="material-symbols-outlined">add</span>Add Listing</a>
   <button class="icon-btn" aria-label="Profile"><span class="material-symbols-outlined">account_circle</span></button>
  </div>
 </div>
</header>

<main class="layout">
 <section class="map-wrap">
  <div class="map-fallback"></div>
  <div id="map"></div>
  <div class="map-tools">
   <label class="search-box">
    <span class="material-symbols-outlined">search</span>
    <input id="searchInput" type="search" placeholder="Tuman yoki Universitet qidirish...">
    <span class="material-symbols-outlined">tune</span>
   </label>
   <div class="chip-row" id="filters">
    <button class="chip active" data-type="all" type="button">Hammasi</button>
    <button class="chip" data-type="offer" type="button">Uy bor</button>
    <button class="chip" data-type="seek" type="button">Qidiryapti</button>
    <button class="chip" data-filter="has_wifi" type="button"><span class="material-symbols-outlined" style="font-size:16px">wifi</span>Wi-Fi</button>
    <button class="chip" data-filter="has_ac" type="button">Konditsioner</button>
    <button class="chip" data-filter="has_washing_machine" type="button">Kir yuvish</button>
    <button class="chip" data-filter="near_metro" type="button">Metro</button>
   </div>
  </div>
  <a class="fab" href="https://t.me/klapa_net_bot?start=add" target="_blank">
   <span class="material-symbols-outlined">send</span>
   Telegram Bot
  </a>
 </section>

 <button class="sheet-toggle" type="button" aria-label="Toggle results panel" aria-expanded="true" onclick="toggleResultsSheet()">
  <span class="material-symbols-outlined">chevron_right</span>
 </button>

 <aside class="results">
  <div class="results-head">
   <h1 class="results-title">Natijalar <span class="results-count" id="resultCount">0 ta joy</span></h1>
   <button class="icon-btn" aria-label="Sort results" title="Sort results"><span class="material-symbols-outlined">swap_vert</span></button>
  </div>
  <div class="cards" id="cards"></div>
  <p class="empty" id="emptyState">Bu filtrga mos e'lon topilmadi.</p>
 </aside>
</main>

<div class="drawer" id="detailDrawer">
 <article class="detail">
  <div class="detail-media" id="detailMedia">
   <button class="close" type="button" onclick="closeDetail()"><span class="material-symbols-outlined">close</span></button>
  </div>
  <div class="detail-body" id="detailBody"></div>
 </article>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const DEMO_LISTINGS = [
 {id:1, listing_type:"offer", university:"TATU", district:"Yunusobod", housing_type:"Kvartira", room_count:3, description:"3 xonali kvartira, 2 ta bola kerak. TATU ga yaqin.", phone_number:"+998901234567", lat:41.3111, lng:69.2797, price:700000, people_needed:2, has_wifi:1, has_ac:0, has_washing_machine:1, no_landlord_in_yard:1, near_metro:1, telegram_username:"aziz_tatu", photos:["https://lh3.googleusercontent.com/aida-public/AB6AXuA-1dOpV1KSbu1vAHSzusu2RnGHUkL2tTLWzkhb2gcBqWHoFRmHxJhGsFhi0pK0z77TPd9S6JZuDyOcWyGB7QAUQSClwiLdoU1uRPrrVafwWaqAARlpPUof59TgHigEXDdEsgfEVV6QwaEhrd98WJitPRRaaosIKP_MzoAEf4p-ORxg352gWCEjF1QH4yV1hB8wPB4e-jipp9QF8jQhbvT3MPfkwJDEU5Puf2X70pzLmcGoP13bIz0fOMl0HP_a9Wz9-8A4lAbB7os"]},
 {id:2, listing_type:"seek", university:"WIUT", district:"Chilonzor", housing_type:null, room_count:null, description:"Faqat talaba qizlar uchun sheriklikka. Metrogacha 5 daqiqa.", phone_number:null, lat:41.2856, lng:69.2034, price:450000, people_needed:1, has_wifi:1, has_ac:1, has_washing_machine:0, no_landlord_in_yard:0, near_metro:1, telegram_username:"madina_wiut", photos:["https://lh3.googleusercontent.com/aida-public/AB6AXuBbnMpjSpM11unrKE1PWI2lnM5m-bAakkaTbs2Z-N3V0BaZm-MRz5fZIgUhmvTX-HBOWJz83JYcLh_SYUL8jmaek_vPSAthy_LVpV6wdZdhO2ZUw6P7dcZ-llGcc7dUqVvJgMmcREEiC917O-JnShyf_4QYLOh_6Ov83kkS8x6BX-PSu8f59EI9X6I-wewm6Ozhr4FYjMMZIcFI0lvJ8KCmnJSrQ6thzdweIBkAJM5BWqjN4zYUGYEvxQUFLhU8Ok71fB_oW_PPOiM"]},
 {id:3, listing_type:"offer", university:"INHA", district:"Mirzo-Ulug'bek", housing_type:"Xonadonli uy", room_count:2, description:"Sokin joy, internet bor, hovlida xojayin turmaydi.", phone_number:"+998931112233", lat:41.34, lng:69.32, price:850000, people_needed:1, has_wifi:1, has_ac:1, has_washing_machine:1, no_landlord_in_yard:1, near_metro:0, telegram_username:"nigina_inha", photos:[]}
];

let map, allListings = [], markers = [], activeType = "all", query = "";
const activeFilters = new Set();
const amenityLabels = {
 has_wifi:["wifi","Wi-Fi"], has_ac:["ac_unit","Konditsioner"],
 has_washing_machine:["local_laundry_service","Kir yuvish"], no_landlord_in_yard:["home","Xo'jayinsiz"],
 near_metro:["train","Metro"]
};

function escapeHtml(value){
 return String(value ?? "").replace(/[&<>"']/g, char => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[char]));
}
function formatPrice(value){ return new Intl.NumberFormat("ru-RU").format(Number(value || 0)) + " so'm"; }
function compactPrice(value){
 const price = Number(value || 0);
 if(price >= 1000000) return (price / 1000000).toFixed(price % 1000000 ? 1 : 0) + "m";
 return Math.round(price / 1000) + "k";
}
function typeInfo(item){
 return item.listing_type === "seek"
  ? {key:"seek", label:"Qidiryapti", sub:`${item.people_needed || 1} kishi turar joy qidiryapti`}
  : {key:"offer", label:"Uy bor", sub:`${item.people_needed || 1} xonadosh kerak`};
}
function titleFor(item){ return [item.district, item.university].filter(Boolean).join(", ") || "Toshkent"; }
function matches(item){
 if(activeType !== "all" && item.listing_type !== activeType) return false;
 for(const filter of activeFilters){ if(!item[filter]) return false; }
 if(!query) return true;
 return [item.district,item.university,item.housing_type,item.description,item.telegram_username].filter(Boolean).join(" ").toLowerCase().includes(query);
}
function photoFor(item){ return item.photos && item.photos.length ? item.photos[0] : ""; }
function tagsFor(item, limit = 3){
 return Object.keys(amenityLabels).filter(key => item[key]).slice(0, limit).map(key => {
  const [icon,label] = amenityLabels[key];
  return `<span class="tag"><span class="material-symbols-outlined" style="font-size:15px">${icon}</span>${escapeHtml(label)}</span>`;
 }).join("");
}
function initMap(){
 if(!window.L) return;
 map = L.map("map", { zoomControl:false }).setView([41.2995,69.2401], 12);
 L.control.zoom({ position:"bottomleft" }).addTo(map);
 L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom:19, attribution:"&copy; OpenStreetMap contributors" }).addTo(map);
}
async function loadListings(){
 try{
  const res = await fetch("/api/listings");
  if(!res.ok) throw new Error("Bad response");
  allListings = await res.json();
  if(!Array.isArray(allListings)) throw new Error("Invalid response");
 }catch(e){ console.error("Failed to load listings", e); allListings = []; }
 render();
}
function render(){
 const filtered = allListings.filter(matches);
 document.getElementById("resultCount").textContent = `${filtered.length} ta joy`;
 document.getElementById("emptyState").style.display = filtered.length ? "none" : "block";
 renderCards(filtered);
 renderMarkers(filtered);
}
function renderMarkers(items){
 if(!map) return;
 markers.forEach(marker => map.removeLayer(marker));
 markers = [];
 items.forEach(item => {
  if(item.listing_type === "seek") return;
  const lat = Number(item.lat), lng = Number(item.lng);
  if(!Number.isFinite(lat) || !Number.isFinite(lng)) return;
  const type = typeInfo(item);
  const icon = L.divIcon({
   className:"",
   html:`<div class="pin ${item.status === "hidden_pending_review" ? "reviewing" : type.key}"><span>${escapeHtml(compactPrice(item.price))}</span></div>`
  });
  const marker = L.marker([lat,lng], { icon }).addTo(map);
  marker.on("click", () => openDetail(item.id));
  markers.push(marker);
 });
}
function renderCards(items){
 const cards = document.getElementById("cards");
 cards.innerHTML = items.map(item => {
  const type = typeInfo(item);
  const photo = photoFor(item);
  return `<article class="card" data-id="${item.id}" onclick="openDetail(${item.id})">
   <div class="card-media">
    ${photo ? `<img src="${escapeHtml(photo)}" alt="Xona rasmi">` : "Rasm yo'q"}
    <button class="favorite" type="button" onclick="event.stopPropagation()"><span class="material-symbols-outlined">favorite_border</span></button>
   </div>
   <div class="card-body">
    <div class="card-price">${formatPrice(item.price)} <small>/oy</small></div>
    <div class="card-top">
     <h2 class="card-title">${escapeHtml(titleFor(item))}</h2>
     <span class="type-badge ${type.key}">${escapeHtml(type.label)}</span>
    </div>
    <p class="desc">${escapeHtml(item.description || type.sub)}</p>
    <div class="tags">${tagsFor(item)}</div>
   </div>
  </article>`;
 }).join("");
}
async function fetchDetail(item){
 if(item._detailLoaded) return item;
 try{
  const res = await fetch(`/api/listings/${item.id}`);

async function openDetail(id){
 let item = allListings.find(entry => Number(entry.id) === Number(id));
 if(!item) return;
 item = await fetchDetail(item);
 document.querySelectorAll(".card").forEach(card => card.classList.toggle("selected", Number(card.dataset.id) === Number(id)));
 const type = typeInfo(item), photo = photoFor(item);
 document.getElementById("detailMedia").innerHTML = `${photo ? `<img src="${escapeHtml(photo)}" alt="Xona rasmi">` : "Rasm yo'q"}<button class="close" type="button" onclick="closeDetail()"><span class="material-symbols-outlined">close</span></button>`;
 const telegram = (item.telegram_username || "").replace(/^@/,"").trim();
 const phone = (item.phone_number || "").trim();
 const infos = [
  item.district && ["Tuman", item.district],
  item.university && ["Universitet", item.university],
  item.housing_type && ["Uy turi", item.housing_type],
  item.room_count && ["Xonalar", `${item.room_count} xona`]
 ].filter(Boolean).map(([label,value]) => `<div class="info"><span>${escapeHtml(label)}</span><b>${escapeHtml(value)}</b></div>`).join("");
 document.getElementById("detailBody").innerHTML = `
  <span class="type-badge ${type.key}">${escapeHtml(type.label)}</span>
  <h2 style="margin:12px 0 4px;font-size:24px">${formatPrice(item.price)} / oyiga</h2>
  <p class="desc" style="-webkit-line-clamp:unset">${escapeHtml(item.description || type.sub)}</p>
  ${infos ? `<div class="detail-grid">${infos}</div>` : ""}
  <div class="tags">${tagsFor(item, 8)}</div>
  <div class="detail-actions">
   ${telegram ? `<a class="primary-action" href="https://t.me/${encodeURIComponent(telegram)}" target="_blank">Telegram orqali yozish</a>` : ""}
   ${phone ? `<a class="secondary-action" href="tel:${escapeHtml(phone.replace(/[^\\d+]/g,""))}">Telefon qilish</a>` : ""}
   <button class="report" type="button" onclick="reportListing(${item.id})">Shikoyat qilish</button>
  </div>`;
 document.getElementById("detailDrawer").classList.add("open");
}
function closeDetail(){ document.getElementById("detailDrawer").classList.remove("open"); }
function toggleResultsSheet(){
 const collapsed = document.body.classList.toggle("sheet-collapsed");
 document.querySelector(".sheet-toggle").setAttribute("aria-expanded", String(!collapsed));
}
function getReporterKey(){
 const storageKey = "sigamiz_reporter_key";
 let key = localStorage.getItem(storageKey);
 if(!key){
  key = window.crypto && crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
  localStorage.setItem(storageKey, key);
 }
 return key;
}
async function reportListing(id){
 const reason = prompt("Shikoyat sababi (masalan: makler, spam):");
 if(!reason) return;
 const reporterKey = encodeURIComponent(getReporterKey());
 try{
  const response = await fetch(`/api/report?listing_id=${id}&reason=${encodeURIComponent(reason)}&reporter_key=${reporterKey}`, { method:"POST" });
  if(!response.ok) throw new Error("Report failed");
  const data = await response.json();
  alert(data.message || "Shikoyat qabul qilindi. Rahmat!");
 }
 catch(e){ alert("Xatolik yuz berdi, birozdan so'ng qayta urinib ko'ring."); }
 closeDetail();
}
